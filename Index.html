<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Profissional - 1 a 75</title>
    <style>
        /* Bloqueia o "puxar para atualizar" no celular */
        body {
            overscroll-behavior-y: contain; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            background-color: #f0f2f5;
            margin: 0;
        }

        .painel-geral {
            margin-bottom: 25px;
            background-color: #fff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 100%;
        }

        h3 { color: #2c3e50; margin: 0 0 10px 0; text-align: center; font-size: 1.1rem; }

        .container-cartelas {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        table { border-collapse: collapse; background-color: #fff; }

        td {
            border: 1px solid #ddd;
            width: 40px;
            height: 40px;
            text-align: center;
            font-size: 17px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            user-select: none;
            transition: all 0.1s;
        }

        /* Números que não estão nas suas fotos ficam mais claros */
        .inexistente { color: #ccc; background-color: #fdfdfd; font-weight: normal; }
        
        td:hover { background-color: #f8f9fa; }

        /* Estilo da marcação verde */
        .marcada {
            background-color: #28a745 !important;
            color: white !important;
            border-color: #1e7e34;
        }

        .controles { display: flex; flex-direction: column; align-items: center; gap: 8px; }

        button {
            padding: 12px 40px;
            font-size: 16px;
            cursor: pointer;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #status-tela { font-size: 10px; color: #7f8c8d; }
    </style>
</head>
<body>

    <div class="painel-geral">
        <h3>Painel de Conferência (1 - 75)</h3>
        <table id="tabela-75"><tbody id="corpo-75"></tbody></table>
    </div>

    <div class="container-cartelas">
        <table class="cartela">
            <tr><td data-num="03">03</td><td data-num="19">19</td><td data-num="33">33</td><td data-num="46">46</td><td data-num="61">61</td></tr>
            <tr><td data-num="05">05</td><td data-num="21">21</td><td data-num="34">34</td><td data-num="51">51</td><td data-num="63">63</td></tr>
            <tr><td data-num="07">07</td><td data-num="22">22</td><td data-num="36">36</td><td data-num="52">52</td><td data-num="66">66</td></tr>
            <tr><td data-num="08">08</td><td data-num="24">24</td><td data-num="38">38</td><td data-num="53">53</td><td data-num="73">73</td></tr>
            <tr><td data-num="14">14</td><td data-num="27">27</td><td data-num="45">45</td><td data-num="55">55</td><td data-num="75">75</td></tr>
        </table>

        <table class="cartela">
            <tr><td data-num="05">05</td><td data-num="17">17</td><td data-num="34">34</td><td data-num="46">46</td><td data-num="64">64</td></tr>
            <tr><td data-num="06">06</td><td data-num="18">18</td><td data-num="35">35</td><td data-num="50">50</td><td data-num="65">65</td></tr>
            <tr><td data-num="10">10</td><td data-num="25">25</td><td data-num="41">41</td><td data-num="52">52</td><td data-num="67">67</td></tr>
            <tr><td data-num="11">11</td><td data-num="26">26</td><td data-num="43">43</td><td data-num="53">53</td><td data-num="68">68</td></tr>
            <tr><td data-num="15">15</td><td data-num="27">27</td><td data-num="44">44</td><td data-num="56">56</td><td data-num="71">71</td></tr>
        </table>

        <table class="cartela">
            <tr><td data-num="06">06</td><td data-num="19">19</td><td data-num="34">34</td><td data-num="47">47</td><td data-num="62">62</td></tr>
            <tr><td data-num="07">07</td><td data-num="21">21</td><td data-num="36">36</td><td data-num="49">49</td><td data-num="63">63</td></tr>
            <tr><td data-num="13">13</td><td data-num="23">23</td><td data-num="40">40</td><td data-num="51">51</td><td data-num="66">66</td></tr>
            <tr><td data-num="14">14</td><td data-num="26">26</td><td data-num="42">42</td><td data-num="53">53</td><td data-num="68">68</td></tr>
            <tr><td data-num="15">15</td><td data-num="30">30</td><td data-num="44">44</td><td data-num="59">59</td><td data-num="69">69</td></tr>
        </table>
    </div>

    <div class="controles">
        <button id="btn-reset">RESETAR JOGO</button>
        <div id="status-tela">Carregando proteção de tela...</div>
    </div>

    <script>
        // 1. Identificar números existentes para estilo
        const celulasCartelas = document.querySelectorAll('.cartela td');
        const listaExistentes = new Set(Array.from(celulasCartelas).map(td => parseInt(td.dataset.num)));

        // 2. Gerar Tabela 1-75 (15 colunas para ficar simétrico com o Bingo 75)
        const corpo75 = document.getElementById('corpo-75');
        let tr = document.createElement('tr');
        for (let i = 1; i <= 75; i++) {
            const numStr = i.toString().padStart(2, '0');
            const td = document.createElement('td');
            td.textContent = numStr;
            td.dataset.num = numStr;
            if (!listaExistentes.has(i)) td.classList.add('inexistente');
            tr.appendChild(td);
            // Quebra a linha a cada 15 números (padrão B-I-N-G-O)
            if (i % 15 === 0) { corpo75.appendChild(tr); tr = document.createElement('tr'); }
        }

        // 3. Sincronização
        const todas = document.querySelectorAll('td');
        todas.forEach(c => {
            c.addEventListener('click', function() {
                const n = this.dataset.num;
                const marcar = !this.classList.contains('marcada');
                document.querySelectorAll(`[data-num="${n}"]`).forEach(el => {
                    marcar ? el.classList.add('marcada') : el.classList.remove('marcada');
                });
            });
        });

        // 4. Reset
        document.getElementById('btn-reset').addEventListener('click', () => {
            if(confirm("Deseja limpar todas as marcações?")) {
                todas.forEach(c => c.classList.remove('marcada'));
            }
        });

        // 5. Proteções (Anti-Refresh e Wake Lock)
        window.onbeforeunload = () => document.querySelector('.marcada') ? true : null;

        let wakeLock = null;
        async function lock() {
            try {
                if('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    document.getElementById('status-tela').textContent = "☀️ Tela sempre ligada";
                }
            } catch (e) {}
        }
        lock();
        document.addEventListener('visibilitychange', () => { if(document.visibilityState === 'visible') lock(); });
    </script>
</body>
</html>
