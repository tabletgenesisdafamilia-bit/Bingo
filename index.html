<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo Pro</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body {
    font-family: Arial;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #f0f2f5;
    margin: 0;
    padding: 20px;
}

table { border-collapse: collapse; }

td {
    width: 42px;
    height: 42px;
    text-align: center;
    border: 1px solid #ccc;
    cursor: pointer;
}

.inexistente { background: #eee; color: #aaa; }
.marcada { background: green; color: white; }

.container-cartelas {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
}

.cartela-wrapper {
    position: relative;
    background: white;
    padding: 5px;
}

.btn-remover {
    position: absolute;
    top: -10px;
    right: -10px;
    background: red;
    color: white;
    border: none;
    border-radius: 50%;
    width: 25px;
    height: 25px;
}

#modal-ocr, #camera-modal {
    display: none;
    position: fixed;
    z-index: 200;
    background: white;
    padding: 15px;
}

.overlay {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 100;
}
</style>
</head>

<body>

<h3>Tabuleiro 1–75</h3>
<table id="tabela-75"><tbody id="corpo-75"></tbody></table>

<div id="status-tela"></div>

<div class="container-cartelas" id="container-cartelas"></div>

<input type="file" id="input-file" accept="image/*">
<button onclick="abrirCamera()">📷 Abrir Câmera</button>
<button onclick="resetarMarcacoes()">Limpar</button>

<div class="overlay" id="overlay"></div>

<!-- MODAL OCR -->
<div id="modal-ocr">
    <div id="grid"></div>
    <button onclick="salvarNovaCartela()">Salvar</button>
</div>

<!-- CÂMERA -->
<div id="camera-modal" style="top:0; left:0; width:100%; height:100%; background:black; text-align:center;">
    <video id="video" autoplay playsinline style="width:100%; max-height:80%;"></video>
    <br><br>
    <button onclick="capturar()">📸 Capturar</button>
    <button onclick="fecharCamera()">❌ Fechar</button>
</div>

<script>

let cartelas = JSON.parse(localStorage.getItem("cartelas")) || [];
let marcados = new Set(JSON.parse(localStorage.getItem("marcados")) || []);

/* ================= DESKTOP / MOBILE ================= */

function isMobile() {
    return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

function manterTelaAtiva() {

    if (!isMobile()) {
        document.getElementById("status-tela").innerText = "💻 Desktop";
        return;
    }

    async function req() {
        try {
            if ("wakeLock" in navigator) {
                await navigator.wakeLock.request("screen");
                document.getElementById("status-tela").innerText = "📱 Tela ativa";
            }
        } catch {}
    }

    req();

    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") req();
    });
}

/* ================= TABULEIRO ================= */

function gerarPainel() {
    const corpo = document.getElementById("corpo-75");
    corpo.innerHTML = "";

    let tr = document.createElement("tr");

    for (let i = 1; i <= 75; i++) {
        const td = document.createElement("td");
        const num = i.toString().padStart(2, "0");

        td.textContent = num;
        td.dataset.num = num;
        td.className = "inexistente";

        tr.appendChild(td);

        if (i % 10 === 0) {
            corpo.appendChild(tr);
            tr = document.createElement("tr");
        }
    }

    corpo.appendChild(tr);
}

/* ================= RENDER ================= */

function renderizarCartelas() {

    const container = document.getElementById("container-cartelas");
    container.innerHTML = "";

    document.querySelectorAll("#tabela-75 td").forEach(td => {
        td.classList.add("inexistente");
        td.classList.remove("marcada");
    });

    cartelas.forEach((nums, index) => {

        const wrapper = document.createElement("div");
        wrapper.className = "cartela-wrapper";

        const btn = document.createElement("button");
        btn.innerText = "X";
        btn.className = "btn-remover";
        btn.onclick = () => {
            if (confirm("Excluir?")) {
                cartelas.splice(index, 1);
                salvar();
            }
        };

        const table = document.createElement("table");

        let html = "";

        nums.forEach((n, i) => {

            if (i % 5 === 0) html += "<tr>";

            const css = marcados.has(n) ? "marcada" : "";

            html += `<td data-num="${n}" class="${css}">${n}</td>`;

            if (i % 5 === 4) html += "</tr>";

            const td = document.querySelector(`#tabela-75 [data-num="${n}"]`);
            if (td) {
                td.classList.remove("inexistente");
                if (marcados.has(n)) td.classList.add("marcada");
            }

        });

        table.innerHTML = html;

        wrapper.appendChild(btn);
        wrapper.appendChild(table);
        container.appendChild(wrapper);

        if (verificarBingo(nums)) {
            wrapper.style.border = "3px solid gold";
            setTimeout(() => alert("🎉 BINGO!"), 100);
        }

    });

    vincular();
}

function vincular() {
    document.querySelectorAll("td[data-num]").forEach(td => {
        td.onclick = () => {
            const n = td.dataset.num;

            if (marcados.has(n)) marcados.delete(n);
            else marcados.add(n);

            salvar();
        };
    });
}

function salvar() {
    localStorage.setItem("cartelas", JSON.stringify(cartelas));
    localStorage.setItem("marcados", JSON.stringify([...marcados]));
    renderizarCartelas();
}

/* ================= OCR ================= */

document.getElementById("input-file").onchange = function(e) {

    const file = e.target.files[0];
    if (!file) return;

    const loader = document.getElementById("status-tela");
    loader.innerText = "📸 Processando...";

    Tesseract.recognize(file, "eng", {
        tessedit_char_whitelist: "0123456789",
        tessedit_pageseg_mode: 6
    })
    .then(({ data: { text } }) => {

        let nums = text.match(/\d+/g) || [];

        nums = nums
            .map(n => parseInt(n))
            .filter(n => n >= 1 && n <= 75)
            .map(n => n.toString().padStart(2, "0"));

        nums = [...new Set(nums)];

        abrirModal(nums.slice(0, 25));

        loader.innerText = "💻 Pronto";

    })
    .catch(() => {
        loader.innerText = "❌ Erro";
        abrirModal([]);
    });
};

/* ================= CÂMERA ================= */

let stream = null;

async function abrirCamera() {

    try {

        stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" }
        });

        document.getElementById("video").srcObject = stream;
        document.getElementById("camera-modal").style.display = "block";

    } catch {
        alert("Erro na câmera");
    }
}

function fecharCamera() {
    if (stream) stream.getTracks().forEach(t => t.stop());
    document.getElementById("camera-modal").style.display = "none";
}

async function capturar() {

    const video = document.getElementById("video");

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    fecharCamera();

    document.getElementById("status-tela").innerText = "📸 Processando...";

    const { data: { text } } = await Tesseract.recognize(canvas, "eng", {
        tessedit_char_whitelist: "0123456789",
        tessedit_pageseg_mode: 6
    });

    let nums = text.match(/\d+/g) || [];

    nums = nums
        .map(n => parseInt(n))
        .filter(n => n >= 1 && n <= 75)
        .map(n => n.toString().padStart(2, "0"));

    nums = [...new Set(nums)];

    abrirModal(nums.slice(0, 25));
}

/* ================= MODAL ================= */

function abrirModal(nums) {

    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    const container = document.createElement("div");

    container.style.display = "grid";
    container.style.gridTemplateColumns = "repeat(5, 40px)";
    container.style.gap = "6px";
    container.style.justifyContent = "center";

    for (let i = 0; i < 25; i++) {

        let v = nums[i] || "";

        // Centro da cartela
        if (i === 12 && !v) v = "XX";

        const input = document.createElement("input");

        // 🔢 Forçar teclado numérico no mobile
        input.type = "tel";
        input.inputMode = "numeric";
        input.pattern = "[0-9]*";

        input.value = v;
        input.maxLength = 2;

        input.style.width = "40px";
        input.style.height = "40px";
        input.style.textAlign = "center";
        input.style.fontSize = "16px";
        input.style.border = "1px solid #ccc";
        input.style.borderRadius = "4px";

        // Seleciona automaticamente o conteúdo ao tocar
        input.onclick = () => input.select();

        // Avanço automático para próximo campo
        input.addEventListener("focus", (e) => {
    // 🔥 seleciona automaticamente o conteúdo ao focar
    setTimeout(() => {
        e.target.select();
    }, 0);
});

input.addEventListener("input", (e) => {
    let val = e.target.value.replace(/\D/g, "");
    e.target.value = val;

    if (val.length === 2) {

        const inputs = container.querySelectorAll("input");
        const next = inputs[i + 1];

        if (next) {
            next.focus();

            // 🔥 garante seleção no próximo campo
            setTimeout(() => {
                next.select();
            }, 0);
        }
    }
});

        container.appendChild(input);
    }

    grid.appendChild(container);

    document.getElementById("modal-ocr").style.display = "block";
    document.getElementById("overlay").style.display = "block";
}

function salvarNovaCartela() {

    const inputs = document.querySelectorAll("#grid input");

    const lista = [...inputs].map(i => i.value.padStart(2, "0"));

    cartelas.push(lista);

    salvar();

    fecharModal();
}

function fecharModal() {
    document.getElementById("modal-ocr").style.display = "none";
    document.getElementById("overlay").style.display = "none";
}

/* ================= BINGO ================= */

function verificarBingo(cartela) {

    const grid = [];

    for (let i = 0; i < 5; i++) {
        grid.push(cartela.slice(i * 5, i * 5 + 5));
    }

    const check = arr => arr.every(n => n === "XX" || marcados.has(n));

    for (let i = 0; i < 5; i++) if (check(grid[i])) return true;

    for (let i = 0; i < 5; i++) {
        let col = [];
        for (let j = 0; j < 5; j++) col.push(grid[j][i]);
        if (check(col)) return true;
    }

    let d1 = [], d2 = [];

    for (let i = 0; i < 5; i++) {
        d1.push(grid[i][i]);
        d2.push(grid[i][4 - i]);
    }

    return check(d1) || check(d2);
}

/* ================= RESET ================= */

function resetarMarcacoes() {
    marcados.clear();
    salvar();
}

/* ================= INIT ================= */

function init() {
    gerarPainel();
    renderizarCartelas();
    manterTelaAtiva();
}

init();

</script>

</body>
</html>
