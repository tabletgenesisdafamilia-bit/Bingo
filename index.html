<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#3498db">
    <title>Bingo Pro</title>
    
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
    <main>
        <section aria-label="Draw Panel">
            <table id="tabela-75" aria-label="Numbers drawn from 1 to 75">
                <tbody id="corpo-75"></tbody>
            </table>
        </section>

        <div id="status-tela" role="status" aria-live="polite"></div>
        
        <section aria-label="Bingo Cards">
            <div class="container-cartelas" id="container-cartelas"></div>
        </section>
        
        <footer class="rodape-botoes" aria-label="Action buttons">
            <label class="btn btn-arquivo" title="Upload image">
                📁<br>Arquivo
                <input type="file" id="input-file" accept="image/*" aria-label="Upload bingo card image">
            </label>
            
            <button class="btn btn-camera" id="btn-camera" title="Open camera">
                📷<br>Abrir<br>Câmera
            </button>
            
            <button class="btn btn-reset" id="btn-reset" title="Clear all marks">
                🗑️<br>Limpar<br>Tudo
            </button>
        </footer>
    </main>

    <!-- Overlay for modals -->
    <div class="overlay" id="overlay" role="presentation"></div>

    <!-- OCR Modal -->
    <dialog id="modal-ocr" role="dialog" aria-labelledby="modal-ocr-title">
        <h2 id="modal-ocr-title">Verify Card Numbers</h2>
        <div id="grid"></div>
        <div class="modal-actions">
            <button id="btn-save-card">Salvar</button>
            <button id="btn-cancel-card">Cancelar</button>
        </div>
    </dialog>

    <!-- Camera Modal -->
    <dialog id="camera-modal" role="dialog" aria-labelledby="camera-modal-title">
        <h2 id="camera-modal-title">Capture Image</h2>
        <video id="video" autoplay playsinline aria-label="Camera feed"></video>
        <div class="modal-actions">
            <button id="btn-capture">📸 Capturar</button>
            <button id="btn-close-camera">❌ Fechar</button>
        </div>
    </dialog>

    <!-- Scripts (using modules) -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
