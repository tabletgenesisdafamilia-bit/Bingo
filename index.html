<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo Pro</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
</head>

<body>

<table id="tabela-75"><tbody id="corpo-75"></tbody></table>

<div id="status-tela"></div>

<div class="container-cartelas" id="container-cartelas"></div>

<div class="rodape-botoes">

    <label class="btn btn-arquivo">
        📁<br>Escolher<br>Arquivo
        <input type="file" id="input-file" accept="image/*" hidden>
    </label>

    <button class="btn btn-camera" onclick="abrirCamera()">
        📷<br>Abrir<br>Câmera
    </button>

    <button class="btn btn-reset" onclick="resetarMarcacoes()">
        🗑️<br>Limpar<br>Tudo
    </button>

</div>

<div class="overlay" id="overlay"></div>

<div id="modal-ocr">
    <div id="grid"></div>
    <button onclick="salvarNovaCartela()">Salvar</button>
</div>

<div id="camera-modal">
    <video id="video" autoplay playsinline></video>
    <button onclick="capturar()">📸 Capturar</button>
    <button onclick="fecharCamera()">❌ Fechar</button>
</div>

<script src="js/storage.js"></script>
<script src="js/bingo.js"></script>
<script src="js/ui.js"></script>
<script src="js/ocr.js"></script>
<script src="js/camera.js"></script>
<script src="js/main.js"></script>

</body>
</html>
